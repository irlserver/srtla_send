# Cargo-deny configuration for srtla-send-rs
# Enforces supply-chain security: advisories and source integrity.
# See https://embarkstudios.github.io/cargo-deny/

[advisories]
yanked = "deny"

# Exception for pre-existing rand unsoundness (RUSTSEC-2026-0097).
# The vulnerability requires: log + thread_rng features + custom logger + specific conditions.
# srtla-send does not use custom loggers or the log crate directly; tracing-subscriber
# is used instead. This is a low-risk exception for dev-only and transitive deps.
[[advisories.ignore]]
id = "RUSTSEC-2026-0097"
reason = "rand unsoundness requires custom logger + log crate; srtla-send uses tracing-subscriber"

[sources]
# Enforce crate source integrity.
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
